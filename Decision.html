<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Decision Card</title>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
<style>

body{
font-family: Arial, Helvetica, sans-serif;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
border:3px solid black;
border-radius:20px;
padding:30px;
width:420px;
}

.header{
display:flex;
align-items:center;
justify-content:center;
margin-bottom:15px;
}
.SBMSDA {
    color: goldenrod;
}

.header img{
width:50px;
margin-right:10px;
}

.title{
font-family: 'Patrick Hand', cursive;
font-size:28px;
letter-spacing:1px;

}

label{
display:block;
margin-top:10px;
}

input[type="text"]{
width:100%;
padding:8px;
margin-top:5px;
}

.options{
margin-top:15px;
font-family: 'Patrick Hand', cursive;

letter-spacing:1px;
}

button{
margin-top:20px;
padding:10px;
width:100%;
background:#2c5aa0;
color:white;
border:none;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1f3f70;
}

</style>
</head>

<body>

<div class="card">

<div class="header">
<img src="sda.png">
<div>
<strong>Seventh-day Adventist Church</strong><br>
<a class="SBMSDA">Southwest Belize Mission of SDA</a>
</div>
</div>

<div class="title">DECISION CARD</div>

<form id="decisionForm" style="font-family: 'Patrick Hand', cursive;">

<label>Name</label>
<input type="text" id="name" required>

<label>Cell #</label>
<input type="text" id="phone">

<label>Village</label>
<input type="text" id="village">

<div class="options">

<p><strong>Place an [✔] beside all that applies to you:</strong></p>

<label><input type="checkbox" id="commit"> I want to be truly committed to Jesus.</label>

<label><input type="checkbox" id="baptism"> I want to be baptized the way the Bible teaches.</label>

<label><input type="checkbox" id="pray"> Please pray for me and my family.</label>

<label><input type="checkbox" id="visit"> Please visit me at my home.</label>

</div>

<button type="submit">Submit Decision Card</button>

</form>

</div>

<script>
document.getElementById("decisionForm").addEventListener("submit", function(e) {
  e.preventDefault(); // prevent page reload

  // collect form data
  const data = {
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    village: document.getElementById("village").value,
    commit_to_jesus: document.getElementById("commit").checked,
    baptism_request: document.getElementById("baptism").checked,
    prayer_request: document.getElementById("pray").checked,
    home_visit_request: document.getElementById("visit").checked,
    timestamp: new Date().toISOString()
  };

  // send to Google Sheet Web App
  fetch("https://script.google.com/macros/s/AKfycbxyeCgFan1Tf0fEv9K2EDfr5Rph_y5aBMQ6rWHPPzlJWjzd42X7E5o8FTptgnxMFnWs3Q/exec", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  })
  .then(res => res.json()) // parse response as JSON
  .then(res => {
    if(res.result === "success") {
      alert("Gracias. Alguien de la iglesia se pondrá en contacto con usted pronto.");
    } else {
      console.error("Error from Web App:", res.error);
      alert("Error al enviar: " + res.error);
    }
  })
  .catch(err => {
    console.error("Network error:", err);
    alert("Error al enviar (network)");
  });
});
</script>

</body>

</html>
